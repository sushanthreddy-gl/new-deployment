version: "3.9"

services:
  # ── Node / Express API ────────────────────────────────────────────────────
  backend:
    build:
      context: ./bill-bloom-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # All secrets (MONGO_URI, JWT_SECRET, API keys, etc.) are read from
    # bill-bloom-backend/.env at runtime — never baked into the image.
    env_file:
      - ./bill-bloom-backend/.env
    environment:
      - NODE_ENV=production   # override / guarantee production mode
    expose:
      - "5000"          # internal only; nginx proxies to this
    networks:
      - app-network

  # ── React SPA served by nginx (also reverse-proxies /api → backend) ───────
  frontend:
    build:
      context: ./bill-bloom-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"         # the only public-facing port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
