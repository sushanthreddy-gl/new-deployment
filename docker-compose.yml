version: "3.9"

services:
  # ── Node / Express API ────────────────────────────────────────────────────
  backend:
    build:
      context: ./bill-bloom-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      # Add any other secrets here or source them from a root-level .env file
    expose:
      - "5000"          # internal only; nginx proxies to this
    networks:
      - app-network

  # ── React SPA served by nginx (also reverse-proxies /api → backend) ───────
  frontend:
    build:
      context: ./bill-bloom-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"         # the only public-facing port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
